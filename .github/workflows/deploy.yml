# ═══════════════════════════════════════════════════════════════
#  InfoKobuleti — Auto-Deploy to Hostinger via FTP
#  Triggers on push to main branch
#  
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    FTP_SERVER    → Hostinger FTP hostname (e.g. ftp.infokobuleti.com)
#    FTP_USERNAME  → FTP account username
#    FTP_PASSWORD  → FTP account password
#    DB_HOST       → MySQL host (from Hostinger hPanel → Databases)
#    DB_NAME       → MySQL database name
#    DB_USER       → MySQL username
#    DB_PASSWORD   → MySQL password
# ═══════════════════════════════════════════════════════════════

name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout code ────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Inject production database config ────────────
      - name: 🔧 Write production config
        run: |
          php scripts/write-prod-config.php
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ─── 3. Create directories on server ──────────────────
      - name: 📁 Create server directories
        run: |
          sudo apt-get install -y lftp
          lftp <<EOF
          set ssl:verify-certificate no
          set ftp:ssl-allow yes
          set cmd:fail-exit no
          open -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}"
          mkdir -p admin/views
          mkdir -p app/controllers
          mkdir -p app/helpers
          mkdir -p app/models
          mkdir -p config
          mkdir -p lang
          mkdir -p public/assets/css
          mkdir -p public/assets/img
          mkdir -p public/assets/js
          mkdir -p views/auth
          mkdir -p views/errors
          mkdir -p views/home
          mkdir -p views/layouts
          mkdir -p views/pages
          mkdir -p views/partials
          mkdir -p views/properties
          mkdir -p views/user
          mkdir -p uploads/properties/original
          mkdir -p uploads/properties/medium
          mkdir -p uploads/properties/thumb
          mkdir -p cache
          bye
          EOF

      # ─── 4. Deploy via FTP ───────────────────────────────
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            scripts/**
            install/**
            cache/**
            uploads/**
            README.md
            DEPLOYMENT.md
            INSTRUCTIONS.md
            .gitignore
